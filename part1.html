<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0f1117">
<title>Kuber — Indian Portfolio Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--bg:#0f1117;--card:#181a20;--sidebar:#13151b;--hover:#1e2028;--input:#1e2028;--t1:#e8eaed;--t2:#8b8fa3;--t3:#5a5e72;--acc:#6366f1;--acc2:#818cf8;--g:#22c55e;--gbg:rgba(34,197,94,.12);--gt:#4ade80;--r:#ef4444;--rbg:rgba(239,68,68,.12);--rt:#f87171;--brd:rgba(255,255,255,.06);--brd2:rgba(255,255,255,.12);--sh:0 1px 3px rgba(0,0,0,.3);--sh2:0 4px 12px rgba(0,0,0,.4);--rad:8px;--rad2:12px;--rad3:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);display:flex;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--brd);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0}
.logo{padding:0 20px;margin-bottom:32px;display:flex;align-items:center;gap:10px}
.logo-icon{font-size:22px;color:var(--acc)}
.logo h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.nav-links{list-style:none;display:flex;flex-direction:column;gap:2px;padding:0 12px}
.nav-item{padding:10px 14px;border-radius:var(--rad);cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--t2);font-weight:500;font-size:14px;transition:.2s}
.nav-item:hover{background:var(--hover);color:var(--t1)}
.nav-item.active{background:var(--acc);color:#fff}
.nav-item i{width:18px;text-align:center;font-size:14px}
.user-profile{margin-top:auto;padding:16px 20px;border-top:1px solid var(--brd);display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--hover);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--brd)}
.user-info{display:flex;flex-direction:column}
.user-name{font-size:13px;font-weight:600}
.user-status{font-size:11px;color:var(--acc)}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.top-header{height:60px;background:var(--sidebar);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.top-header h2{font-size:17px;font-weight:600}
.header-actions{display:flex;align-items:center;gap:10px;position:relative}
.btn{padding:8px 14px;border-radius:var(--rad);font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;transition:.2s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--acc);color:#fff}
.btn-primary:hover{background:var(--acc2);transform:translateY(-1px)}
.btn-text{background:transparent;color:var(--t2);border:1px solid var(--brd)!important}
.btn-text:hover{background:var(--hover);color:var(--t1)}
.btn-danger{background:var(--r);color:#fff}
.full-width{width:100%;justify-content:center}
.views-container{padding:24px;overflow-y:auto;flex:1;min-height:0}
.view{display:none;animation:fadeIn .3s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.glass-panel,.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--rad3);padding:20px}
.ticker-wrap{background:var(--card);border-radius:var(--rad2);padding:6px 16px;margin-bottom:16px;display:flex;align-items:center;border:1px solid var(--brd);font-size:11px;font-weight:600;color:var(--t2);width:100%;overflow:hidden}
.ticker{white-space:nowrap;animation:ticker 25s linear infinite;display:flex;gap:24px}
@keyframes ticker{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.ticker-item{display:inline-flex;align-items:center;gap:6px}
.dot{display:inline-block;width:6px;height:6px;background:var(--g);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.indices-row{display:flex;gap:10px;overflow-x:auto;margin-bottom:16px;scrollbar-width:none}
.indices-row::-webkit-scrollbar{display:none}
.index-card{background:var(--card);border-radius:var(--rad2);padding:12px 16px;border:1px solid var(--brd);min-width:130px;flex-shrink:0}
.idx-name{font-size:10px;color:var(--t3);text-transform:uppercase;margin-bottom:4px;font-weight:600;letter-spacing:.5px}
.idx-val{font-size:16px;font-weight:700}
.idx-change{font-size:11px;font-weight:700;margin-top:2px}
.portfolio-hero-card{background:linear-gradient(135deg,#1a1c2e,#0f1117);border-radius:var(--rad3);padding:24px 24px 0;margin-bottom:20px;color:#fff;position:relative;overflow:hidden;border:1px solid var(--brd)}
.portfolio-hero-card::before{content:'';position:absolute;top:-50%;right:-30%;width:300px;height:300px;background:radial-gradient(circle,rgba(99,102,241,.08),transparent 70%);border-radius:50%}
.hero-label{font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:600;letter-spacing:1px;margin-bottom:6px}
.hero-value{font-size:34px;font-weight:700;margin-bottom:12px;letter-spacing:-.5px}
.hero-pills{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill-profit{background:var(--gbg);color:var(--gt)}
.pill-loss{background:var(--rbg);color:var(--rt)}
.hero-chart-container{height:55px;margin:0 -24px;position:relative}
.sub-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sub-stat-card{background:var(--card);border-radius:var(--rad2);padding:16px;border:1px solid var(--brd)}
.stat-label{font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:600;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:18px;font-weight:700;margin-bottom:2px}
.stat-sub{font-size:11px;color:var(--t2)}
.holdings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.holdings-header h3{font-size:15px;font-weight:600}
.btn-link{background:none;border:none;color:var(--t3);font-size:12px;font-weight:500;cursor:pointer;transition:.2s}
.btn-link:hover{color:var(--acc)}
.holdings-list-card{background:var(--card);border-radius:var(--rad2);border:1px solid var(--brd);overflow:hidden}
.holding-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--brd);transition:.15s;cursor:pointer}
.holding-row:hover{background:var(--hover)}
.holding-row:last-child{border-bottom:none}
.holding-left{display:flex;align-items:center;gap:12px}
.holding-icon{width:38px;height:38px;border-radius:var(--rad);background:rgba(99,102,241,.1);color:var(--acc);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px}
.holding-details h4{font-size:13px;font-weight:600;margin-bottom:2px}
.holding-details p{font-size:11px;color:var(--t3)}
.holding-right{text-align:right}
.holding-val{font-size:13px;font-weight:600;margin-bottom:3px}
.holding-pl-pill{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block;background:var(--gbg);color:var(--g)}
.holding-pl-pill.loss{background:var(--rbg);color:var(--r)}
.alloc-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--brd)}
.alloc-row:last-child{border-bottom:none}
.alloc-label{display:flex;align-items:center;gap:8px;width:110px;font-size:12px;font-weight:600;flex-shrink:0}
.alloc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alloc-bar-container{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:4px;margin:0 14px;overflow:hidden}
.alloc-bar{height:100%;border-radius:4px;transition:width .5s ease}
.alloc-val{width:50px;text-align:right;font-size:12px;font-weight:600;color:var(--t2);flex-shrink:0}
.table-responsive{overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0}
th,td{padding:12px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--brd)}
th{color:var(--t3);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.5px;background:rgba(255,255,255,.02);position:sticky;top:0}
td{font-weight:500}
tbody tr{transition:.15s}
tbody tr:hover td{background:var(--hover)}
tbody tr:last-child td{border-bottom:none}
.action-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--brd);background:transparent;color:var(--t2);cursor:pointer;font-size:12px;display:inline-flex;align-items:center;justify-content:center;transition:.2s;margin-right:4px}
.action-btn:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
.action-btn.delete:hover{background:var(--r);border-color:var(--r)}
.profit{color:var(--g)!important}
.loss{color:var(--r)!important}
.bg-profit{background:var(--gbg);color:var(--g);padding:3px 8px;border-radius:4px;font-weight:700;font-size:11px}
.bg-loss{background:var(--rbg);color:var(--r);padding:3px 8px;border-radius:4px;font-weight:700;font-size:11px}
.tag{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid var(--brd);color:var(--t3);margin-left:6px}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-container h3{font-size:14px;font-weight:600;margin-bottom:16px}
.canvas-wrapper{position:relative;height:260px}
.rebalance-header{margin-bottom:20px}
.rebalance-header h3{font-size:17px;font-weight:600;margin-bottom:6px}
.rebalance-header p{font-size:13px;color:var(--t2)}
.dashboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.stat-card{display:flex;flex-direction:column;gap:8px;padding:20px;background:var(--card);border-radius:var(--rad3);border:1px solid var(--brd)}
.stat-card h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.active{display:flex}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
input[type="text"],input[type="number"],input[type="date"],select{width:100%;padding:10px 14px;background:var(--input);border:1px solid var(--brd);border-radius:var(--rad);color:var(--t1);font-family:inherit;font-size:13px;outline:none;transition:.2s;font-weight:500}
input:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(99,102,241,.15)}
input::placeholder{color:var(--t3)}
.error-msg{color:var(--r);font-size:11px;margin-top:4px;display:none}
.radio-group{display:flex;gap:10px}
.radio-btn{flex:1;padding:10px;background:var(--input);border:1px solid var(--brd);border-radius:var(--rad);cursor:pointer;text-align:center;font-weight:600;font-size:13px;color:var(--t2);transition:.2s}
.radio-btn:has(input:checked){background:var(--acc);color:#fff;border-color:var(--acc)}
.radio-btn input{display:none}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cat-btn{padding:10px;border:1px solid var(--brd);border-radius:var(--rad);background:var(--input);color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:500;font-size:13px;transition:.2s;font-family:inherit}
.cat-btn:hover{border-color:var(--brd2);background:var(--hover)}
.cat-btn.active{border-color:var(--acc);background:rgba(99,102,241,.1);color:var(--acc)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.notification-bell{font-size:16px;color:var(--t2);cursor:pointer;position:relative;padding:8px;border-radius:50%;background:var(--hover);display:flex;align-items:center;justify-content:center;transition:.2s}
.badge{position:absolute;top:-2px;right:-2px;background:var(--r);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;border:2px solid var(--sidebar)}
.notif-dropdown{top:44px;right:0;z-index:100;position:absolute;width:300px;display:none;flex-direction:column;background:var(--card);border:1px solid var(--brd);border-radius:var(--rad2);padding:16px;box-shadow:var(--sh2)}
.notif-dropdown.active{display:flex}
.search-box{position:relative}
.search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px}
.search-box input{padding-left:38px;width:240px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mb-4{margin-bottom:20px}
.mt-4{margin-top:16px}
.view-toggle{display:flex;background:var(--bg);border-radius:var(--rad);padding:3px;border:1px solid var(--brd)}
.device-btn{background:transparent;border:none;color:var(--t3);width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.2s}
.device-btn.active{background:var(--card);color:var(--acc);box-shadow:var(--sh)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
@media(max-width:1024px){.sub-stats-grid{grid-template-columns:repeat(2,1fr)}.analytics-grid,.dashboard-grid{grid-template-columns:1fr}}
@media(max-width:768px){body{flex-direction:column}.sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--brd);padding:12px;flex-direction:row;align-items:center;justify-content:space-between}.logo{margin-bottom:0}.nav-links{flex-direction:row;gap:4px;padding:0;overflow-x:auto}.nav-item{padding:8px 10px;font-size:12px;white-space:nowrap}.nav-item span{display:none}.user-profile{display:none}.views-container{padding:14px}.top-header{padding:0 14px;height:52px}.sub-stats-grid{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}.hero-value{font-size:26px}.search-box input{width:160px}}
</style>
</head>
